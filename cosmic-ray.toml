[cosmic-ray]
module-path = "invariants"
timeout = 5
excluded-modules = ["invariants/viz/*.py"]
test-command = "uv run pytest tests/ -x -q"
distributor.name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = [
  # `is` vs `==` and `is not` vs `!=` are equivalent for type/class identity checks.
  "core/ReplaceComparisonOperator_Is_Eq",
  "core/ReplaceComparisonOperator_IsNot_NotEq",
]
